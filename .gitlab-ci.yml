stages:
  - test
  - build
  - deploy
  - integration
  - restart
  - admit
  - teardown

workflow:
  rules:
    # 合并请求流水线（对应 GitHub 的 pull_request）
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    # 分支 push（对应 GitHub 的 push）
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: always
    # 手动触发
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

default:
  timeout: 3h
  tags:
    - hk
  image: starrocks/dev-env-ubuntu:3.3.16
  interruptible: true
  cache:
    - key: "maven-cache"
      paths:
        - .m2/repository/
      policy: pull-push
    - key: "ccache-${CI_COMMIT_REF_SLUG}"
      paths:
        - ${CI_PROJECT_DIR}/.ccache/
      policy: pull-push
  before_script:
    # 设置环境变量
    - export PR_NUMBER="${CI_MERGE_REQUEST_IID:-${CI_PIPELINE_IID}}"
    - export BRANCH="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-${CI_COMMIT_BRANCH}}"
    - export CODE_PATH="${CI_PROJECT_DIR}"

    # 显示当前状态
    - echo "Current branch:" ${CI_COMMIT_BRANCH}
    - echo "Current commit:" ${CI_COMMIT_SHA}
    - echo "Working directory:" ${CI_PROJECT_DIR}

variables:
  RUNNER_SCRIPT_TIMEOUT: 3h
  # 使用GitLab默认的Git策略
  GIT_STRATEGY: fetch
  # 编译提速
  CCACHE_DIR: "${CI_PROJECT_DIR}/.ccache"
  CCACHE_MAXSIZE: "30G"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  # 保持完整历史记录
  GIT_DEPTH: "0"
  GIT_SUBMODULE_STRATEGY: recursive

# ===== TEST STAGE =====
be-ut:
  stage: test
  timeout: 3h
  variables:
    KUBERNETES_CPU_REQUEST: "60"
    KUBERNETES_CPU_LIMIT: "60"
    KUBERNETES_MEMORY_REQUEST: "120Gi"
    KUBERNETES_MEMORY_LIMIT: "120Gi"
  cache:
    - key: "ccache-${CI_COMMIT_REF_SLUG}"
      paths:
        - ${CI_PROJECT_DIR}/.ccache/
      policy: pull-push
  script:
    - export STARROCKS_HOME=${CI_PROJECT_DIR}
    - export BE_UT_PARALLEL=16

    - mkdir -p ${CI_PROJECT_DIR}/log
    - mkdir -p ${CI_PROJECT_DIR}/.ccache
    - mkdir -p /root/.cache
    - export DEBIAN_FRONTEND=noninteractive
    - export "GTEST_PARALLEL_OPTIONS=-w 30 -d ${CI_PROJECT_DIR}/log --timeout_per_test 300"
    - export BUILD_JAVA_EXT=ON
    - apt update -qq
    - apt install -y -qq pigz openjdk-17-jdk > /dev/null
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - update-alternatives --install /usr/bin/ld ld /usr/bin/lld-14 1000
    - ld -v
    # 配置 gtest-parallel
    - git clone --depth 1 https://github.com/google/gtest-parallel.git ${CI_PROJECT_DIR}/gtest-parallel
    - chmod +x ${CI_PROJECT_DIR}/gtest-parallel/gtest-parallel
    - export GTEST_PARALLEL=${CI_PROJECT_DIR}/gtest-parallel/gtest-parallel

    # 配置 ccache
    - ccache -M 30G
    - ccache --set-config=cache_dir=${CI_PROJECT_DIR}/.ccache
    - ccache --zero-stats

    # 配置对象存储相关环境变量（用于测试）
    - echo 'object_storage_access_key_id = minioadmin' >> ~/.starrocks_config
    - echo 'object_storage_secret_access_key = minioadmin' >> ~/.starrocks_config
    - echo 'object_storage_endpoint = http://127.0.0.1:9000' >> ~/.starrocks_config
    - echo 'object_storage_bucket = starrocks-fs-s3-ut' >> ~/.starrocks_config

    # 设置构建环境变量
    - export STARROCKS_VERSION=$BRANCH
    - export BUILD_TYPE=Release
    - export STARROCKS_HOME=${CI_PROJECT_DIR}
    - source env.sh
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

    # 运行 BE 单元测试，日志写入文件避免超过 CI 日志限制
    - echo "Running BE Unit Tests"
    - |
      set +e
      timeout 5400 ./run-be-ut.sh -j $(nproc) --gtest_filter=-BrpcStubCacheTest.test_cleanup:BrpcStubCacheTest.test_lake_cleanup:BrpcStubCacheTest.test_http_cleanup 2>&1 | tee ${CI_PROJECT_DIR}/log/be-ut.log | grep -E --line-buffered '^\[.*\].*FAILED|^\[.*\].*PASSED|^Running test:|error:|Error |FAILED|Fatal|fatal|CMake Error|Build FAILED|ninja: build stopped'
      BE_EXIT_CODE=${PIPESTATUS[0]}
      set -e
    - echo "=== BE UT exit code: ${BE_EXIT_CODE} ==="
    - ccache -s
    - exit ${BE_EXIT_CODE}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - log/

fe-ut:
  stage: test
  timeout: 3h
  variables:
    FE_UT_PARALLEL: "16"
    KUBERNETES_CPU_REQUEST: "30"
    KUBERNETES_CPU_LIMIT: "30"
    KUBERNETES_MEMORY_REQUEST: "60Gi"
    KUBERNETES_MEMORY_LIMIT: "60Gi"
  script:
    # 安装 JDK 17（fe-core 已要求 maven.compiler.target=17）
    - apt update -qq
    - apt install -y -qq openjdk-17-jdk > /dev/null
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

    # 设置环境变量
    - |
      fe_filter='--filter com.starrocks.epack.authentication.SecurityIntegrationTest#testSecurityIntegrationDdlPersist,com.starrocks.analysis.ShowProcesslistStmtTest#testSuccess,com.starrocks.load.loadv2.BrokerLoadJobTest#testCommitRateExceeded,com.starrocks.server.ConcurrentDDLTest#testConcurrentlyDropDbAndCreateTable,com.starrocks.http.TransactionLoadActionOnSharedDataClusterTest#beginTransactionWithoutChannelInfoTest,com.starrocks.analysis.SetWarehouseStmtTest#testSetWarehouse,com.starrocks.http.TransactionLoadActionOnSharedDataClusterTest#transactionLoadCoordinatorMgrMultiBeOnSameNodeWithoutChannelTest,com.starrocks.http.TransactionLoadActionOnSharedDataClusterTest#transactionLoadCoordinatorMgrOneBeOnNodeWithoutChannelTest,com.starrocks.http.TransactionLoadActionOnSharedDataClusterTest#transactionLoadCoordinatorMgrWithoutChannelTest,com.starrocks.transaction.LakePublishBatchTest#testPublishTransactionState,com.starrocks.transaction.LakePublishBatchTest#testTransfromSingleToBatch,com.starrocks.transaction.LakePublishBatchTest#testTransformBatchToSingle,com.starrocks.statistic.CacheRelaxDictManagerTest,com.starrocks.alter.LakeSyncMaterializedViewTest#testCreateSyncMV_WithLowerColumn,com.starrocks.alter.LakeSyncMaterializedViewTest#testMaterializedViews,com.starrocks.catalog.CatalogRecycleBinLakeTableTest#testRecycleLakeDatabase(LakeService),com.starrocks.planner.TablePruningTest#testPermuteFromClausesRandomlyAndMoveOnJoinPredicatesToWhereClauses,com.starrocks.backup.BackupHandlerTest#testCreateAndDropRepository,com.starrocks.transaction.LakePublishBatchTest#testBatchPublishReplicationTransaction,com.starrocks.transaction.LakePublishBatchTest#testNormal,com.starrocks.sql.dump.QueryDumpRegressionTest,com.starrocks.sql.dump.QueryDumpCaseRewriter'

    # 调整内存配置
    - sed -i 's#4096#3072#g' fe/fe-core/pom.xml
    - sed -i 's#2.22.2#3.5.3#g' fe/fe-core/pom.xml

    # 运行 FE 单元测试，日志写入文件避免超过 CI 日志限制
    - mkdir -p ${CI_PROJECT_DIR}/log
    - |
      export STARROCKS_HOME=${CI_PROJECT_DIR}
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      echo "Running FE Unit Tests with parallel: $FE_UT_PARALLEL"
      set +e
      timeout 4000 ./run-fe-ut.sh ${fe_filter} 2>&1 | tee ${CI_PROJECT_DIR}/log/fe-ut.log | grep -E --line-buffered '^\[ERROR\]|BUILD SUCCESS|BUILD FAILURE|Tests run:|Failed tests:|Tests in error:|^Running '
      FE_EXIT_CODE=${PIPESTATUS[0]}
      set -e
    - echo "=== FE UT exit code: ${FE_EXIT_CODE} ==="
    - exit ${FE_EXIT_CODE}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - log/

# ===== BUILD STAGE =====
build:
  stage: build
  timeout: 120 minutes
  variables:
    KUBERNETES_CPU_REQUEST: "60"
    KUBERNETES_CPU_LIMIT: "60"
    KUBERNETES_MEMORY_REQUEST: "120Gi"
    KUBERNETES_MEMORY_LIMIT: "120Gi"
  needs:
    - fe-ut
    - be-ut
  script:
    # 配置编译环境
    - export DEBIAN_FRONTEND=noninteractive
    - apt update -qq
    - apt install -y -qq pigz openjdk-17-jdk > /dev/null
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

    # 配置 ccache
    - ccache -M 30G
    - ccache --set-config=cache_dir=${CI_PROJECT_DIR}/.ccache
    - ccache --zero-stats

    # 配置对象存储相关环境变量
    - echo 'object_storage_access_key_id = minioadmin' >> ~/.starrocks_config
    - echo 'object_storage_secret_access_key = minioadmin' >> ~/.starrocks_config
    - echo 'object_storage_endpoint = http://127.0.0.1:9000' >> ~/.starrocks_config
    - echo 'object_storage_bucket = starrocks-fs-s3-ut' >> ~/.starrocks_config

    # 设置构建环境变量
    - export STARROCKS_VERSION=$BRANCH
    - export BUILD_TYPE=Release
    - export STARROCKS_HOME=${CI_PROJECT_DIR}
    - source env.sh
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

    # 完整构建 BE 和 FE，日志写入文件避免超过 CI 日志限制
    - mkdir -p ${CI_PROJECT_DIR}/log
    - |
      set +e
      ./build.sh --be --fe --with-gcov --enable-shared-data -j $(nproc) 2>&1 | tee ${CI_PROJECT_DIR}/log/build.log | grep -E --line-buffered 'error:|Error |FAILED|Fatal|fatal|CMake Error|Build FAILED|ninja: build stopped|BUILD SUCCESS|BUILD FAILURE|^\[.*\].*Building '
      BUILD_EXIT_CODE=${PIPESTATUS[0]}
      set -e
    - echo "=== Build exit code: ${BUILD_EXIT_CODE} ==="
    - ccache -s
    - exit ${BUILD_EXIT_CODE}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - output/
      - log/

# ===== DOCKER BUILD STAGE =====
docker-build:
  stage: build
  image:
    name: moby/buildkit:rootless
    entrypoint: [ "" ]
  variables:
    KUBERNETES_CPU_REQUEST: "8"
    KUBERNETES_CPU_LIMIT: "8"
    KUBERNETES_MEMORY_REQUEST: "16Gi"
    KUBERNETES_MEMORY_LIMIT: "16Gi"
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  cache: []
  needs:
    - job: build
      artifacts: true
  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$DOCKER_REGISTRY_URL\":{\"username\":\"$DOCKER_REGISTRY_USER\",\"password\":\"$DOCKER_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    # 设置镜像标签
    - |
      IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
      echo "IMAGE_TAG=${IMAGE_TAG}" >> job.env
      echo "Building Docker image with tag: ${IMAGE_TAG}"

    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt filename=docker/dockerfiles/allin1/allin1-ubuntu.Dockerfile \
        --opt platform=linux/amd64,linux/arm64 \
        --output type=image,name=${DOCKER_REGISTRY_URL}/bigdata/starrocks/allin1-ubuntu:${IMAGE_TAG},push=true

      echo "Docker image pushed: ${DOCKER_REGISTRY_URL}/bigdata/starrocks/allin1-ubuntu:${IMAGE_TAG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
  artifacts:
    expire_in: 1 day
    reports:
      dotenv: job.env

